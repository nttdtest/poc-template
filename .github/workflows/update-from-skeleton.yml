name: Update Repository from Skeleton

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight
  workflow_dispatch:

jobs:
  update-from-skeleton:
    name: Update from Skeleton
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout Repository
        uses: actions/checkout@v6

      - id: setup-python
        name: Set up Python 3.14
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          python-version: 3.14

      - id: install-copier
        name: Install Copier
        run: |
          uv tool install copier

      - id: get-repo-custom-properties
        name: Get Repository Custom Properties
        uses: launchbynttdata/launch-workflows/.github/actions/repo-custom-properties.yml@feat/prerelease-on-merge

      - id: run-updates
        name: Run Updates from Skeleton
        run: |
          SKELETON_RELEASE_TRAIN=$(echo '${{ steps.get-repo-custom-properties.outputs.properties }}' | jq -r '.[] | select(.property_name == "skeleton_release_train") | .value')

          if [ "$SKELETON_RELEASE_TRAIN" == "prerelease" ]; then
            echo "Using prerelease versions of skeleton workflows"
            uv run copier update --defaults --overwrite --prerelease
          else
            echo "Using stable versions of skeleton workflows"
            uv run copier update --defaults --overwrite
          fi

          if git diff --quiet; then
            echo "No changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - id: get-app-token
        uses: actions/create-github-app-token@v3
        if: steps.run-updates.outputs.has_changes == 'true'
        with:
          app-id: ${{ vars.LAUNCH_SKELETON_UPDATE_APP_ID }}
          private-key: ${{ secrets.LAUNCH_SKELETON_UPDATE_KEY }}

      - name: Commit and Push Changes
        id: commit-and-push
        if: steps.run-updates.outputs.has_changes == 'true'
        run: |
          USER_ID=$(gh api "/users/${{ steps.get-app-token.outputs.app-slug }}[bot]" --jq .id)

          git config --global user.name '${{ steps.get-app-token.outputs.app-slug }}[bot]'
          git config --global user.email "$USER_ID+${{ steps.get-app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          BRANCH_NAME="patch/skeleton-update-$(date +%Y%m%d)"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "chore: update from skeleton"
          git push origin "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}

      - name: Create Pull Request
        if: steps.run-updates.outputs.has_changes == 'true'
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.commit-and-push.outputs.branch_name }}" \
            --title "chore: update from skeleton" \
            --body "Automated update from skeleton template."
          gh pr merge "${{ steps.commit-and-push.outputs.branch_name }}" --auto --squash
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
